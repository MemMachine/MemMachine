# Benchmark configuration for answer model and evaluation model.
#
# Format mirrors the MemMachine server configuration.yml language_models section.
# Each model entry requires:
#   provider  -- one of: openai-responses, openai-chat-completions, amazon-bedrock
#   config    -- provider-specific settings (see examples below)
#
# Environment variables can be referenced with ${VAR} or $VAR syntax.

# ── Answer model ────────────────────────────────────────────────────────
# Used to generate final answers from retrieved memories during benchmarks.

answer_model:
  provider: openai-responses
  config:
    api_key: ${OPENAI_API_KEY}
    base_url: https://api.openai.com/v1
    model: gpt-5-mini

# ── Evaluation model ────────────────────────────────────────────────────
# Used by the LLM judge to score answer correctness.

evaluation_model:
  provider: openai-responses
  config:
    api_key: ${OPENAI_API_KEY}
    base_url: https://api.openai.com/v1
    model: gpt-5-mini

